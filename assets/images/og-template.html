<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>pdfed OG</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0b0f1a;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #f5f7fa;
  }
  .canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    min-width: 1200px;
    min-height: 630px;
    background:
      radial-gradient(900px 500px at 78% 22%, rgba(255, 138, 101, 0.22), transparent 60%),
      radial-gradient(700px 500px at 20% 85%, rgba(255, 90, 54, 0.18), transparent 65%),
      linear-gradient(135deg, #0b0f1a 0%, #141925 55%, #10141f 100%);
    overflow: hidden;
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at center, black 40%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 75%);
  }
  .content {
    position: relative;
    display: flex;
    align-items: center;
    width: 100%;
    height: 100%;
    padding: 56px 64px 72px 64px;
    z-index: 2;
  }
  .left { flex: 1.15; display: flex; flex-direction: column; gap: 22px; }
  .right { flex: 1; position: relative; height: 100%; display: flex; align-items: center; justify-content: center; }

  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark {
    width: 54px; height: 54px; border-radius: 14px;
    background: linear-gradient(135deg, #ff5a36 0%, #ff8a65 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 30px rgba(255, 90, 54, 0.35);
  }
  .brand-name { font-weight: 800; font-size: 36px; letter-spacing: -0.02em; }

  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 10px 18px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    font-size: 14px; font-weight: 600; letter-spacing: 0.14em;
    color: #d9deea;
    width: fit-content;
    text-transform: uppercase;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ff5a36;
    box-shadow: 0 0 12px #ff5a36;
  }

  h1 {
    font-size: 70px; font-weight: 800; line-height: 1.05; letter-spacing: -0.025em;
    color: #ffffff;
  }
  .accent {
    background: linear-gradient(135deg, #ff5a36 0%, #ff8a65 60%, #ffb199 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle {
    font-size: 20px; line-height: 1.4; color: #aab3c5;
    max-width: 540px;
    font-weight: 400;
  }
  .pills { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    font-size: 15px; font-weight: 600; color: #e4e8f1;
  }
  .pill .ico { width: 16px; height: 16px; display: inline-flex; }

  .url {
    position: absolute;
    left: 64px; bottom: 28px;
    font-size: 17px; font-weight: 600; color: #b5bdd0;
    letter-spacing: 0.04em;
    z-index: 5;
  }

  /* Right side visual */
  .stage {
    position: relative;
    width: 440px; height: 480px;
  }
  .doc {
    position: absolute;
    top: 20px; left: 30px;
    width: 360px; height: 440px;
    background: #ffffff;
    border-radius: 14px;
    transform: rotate(6deg);
    box-shadow:
      0 30px 80px rgba(0,0,0,0.45),
      0 10px 30px rgba(255, 90, 54, 0.18);
    overflow: hidden;
    color: #1a1f2e;
  }
  .doc-top {
    height: 44px; background: #f6f7fa;
    display: flex; align-items: center; gap: 6px; padding: 0 14px;
    border-bottom: 1px solid #eceff5;
  }
  .doc-top .d { width: 10px; height: 10px; border-radius: 50%; background: #e4e8f1; }
  .doc-top .d.r { background: #ff5a36; }
  .doc-top .d.y { background: #ffb94b; }
  .doc-top .d.g { background: #2ecc71; }
  .doc-body { padding: 26px 28px; display: flex; flex-direction: column; gap: 12px; }
  .doc-title { font-size: 20px; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 8px; color: #10141f; }
  .line { height: 10px; border-radius: 4px; background: #eef1f6; }
  .line.w90 { width: 90%; }
  .line.w75 { width: 75%; }
  .line.w95 { width: 95%; }
  .line.w60 { width: 60%; }
  .line.w80 { width: 80%; }
  .redact { height: 14px; background: #10141f; border-radius: 3px; }
  .redact.w40 { width: 40%; }
  .redact.w25 { width: 25%; display: inline-block; margin-right: 6px; vertical-align: middle; }
  .inline-row { display: flex; align-items: center; gap: 6px; }
  .sign {
    margin-top: 14px;
    font-family: "Snell Roundhand", "Apple Chancery", "Brush Script MT", cursive;
    font-size: 36px; color: #10141f; font-weight: 600;
    transform: rotate(-4deg);
  }
  .sign-line { width: 180px; height: 1px; background: #d0d5e0; margin-top: 4px; }
  .sign-label { font-size: 11px; color: #8892a8; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }

  .chip {
    position: absolute;
    background: #ffffff;
    border-radius: 14px;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    color: #1a1f2e;
    font-size: 15px; font-weight: 700;
    white-space: nowrap;
  }
  .chip .bubble {
    width: 30px; height: 30px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    color: white;
  }
  .chip.c1 { top: 40px; right: -10px; }
  .chip.c1 .bubble { background: linear-gradient(135deg, #ff5a36, #ff8a65); }
  .chip.c2 { top: 230px; left: -40px; }
  .chip.c2 .bubble { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
  .chip.c3 { bottom: 60px; right: 10px; }
  .chip.c3 .bubble { background: linear-gradient(135deg, #10b981, #34d399); }
</style>
</head>
<body>
  <div class="canvas">
    <div class="grid"></div>
    <div class="content">
      <div class="left">
        <div class="brand">
          <div class="brand-mark">
            <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
              <path d="M10 10H18C20.2091 10 22 11.7909 22 14V14C22 16.2091 20.2091 18 18 18H10V10Z" fill="white"/>
              <path d="M10 18H16V22H10V18Z" fill="white"/>
            </svg>
          </div>
          <div class="brand-name">pdfed</div>
        </div>

        <div class="badge"><span class="dot"></span> Privacy-First PDF Editor</div>

        <h1>The PDF Editor<br>You <span class="accent">Won&rsquo;t Hate.</span></h1>

        <p class="subtitle">Edit, sign, redact &amp; annotate PDFs right in your browser. Files never leave your device.</p>

        <div class="pills">
          <div class="pill">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="#ff8a65" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Free Forever
          </div>
          <div class="pill">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            100% Local
          </div>
          <div class="pill">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            Chrome Extension
          </div>
        </div>
      </div>

      <div class="right">
        <div class="stage">
          <div class="doc">
            <div class="doc-top">
              <div class="d r"></div><div class="d y"></div><div class="d g"></div>
            </div>
            <div class="doc-body">
              <div class="doc-title">Confidential Agreement</div>
              <div class="line w95"></div>
              <div class="line w90"></div>
              <div class="inline-row">
                <div class="line w75" style="flex:1"></div>
              </div>
              <div class="inline-row">
                <span style="height:10px;background:#eef1f6;border-radius:4px;flex:1"></span>
                <span class="redact w25"></span>
                <span style="height:10px;background:#eef1f6;border-radius:4px;width:40px"></span>
              </div>
              <div class="line w95"></div>
              <div class="redact w40"></div>
              <div class="line w80"></div>
              <div class="line w60"></div>
              <div class="sign">Signed</div>
              <div class="sign-line"></div>
              <div class="sign-label">Signature</div>
            </div>
          </div>

          <div class="chip c1">
            <span class="bubble">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </span>
            Edit Text
          </div>
          <div class="chip c2">
            <span class="bubble">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </span>
            100% Private
          </div>
          <div class="chip c3">
            <span class="bubble">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/><line x1="4" y1="15" x2="20" y2="15" stroke-dasharray="2 2"/></svg>
            </span>
            No Uploads
          </div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
